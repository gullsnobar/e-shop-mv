version: '3.8'

services:
  # MongoDB (for local development)
  mongodb:
    image: mongo:7.0
    container_name: healio-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: healio_admin
      MONGO_INITDB_ROOT_PASSWORD: healio_password
      MONGO_INITDB_DATABASE: healio
    volumes:
      - mongodb_data:/data/db
    networks:
      - healio-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healio-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - healio-network

  # AI Engine
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: healio-ai-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-engine/.env
    volumes:
      - ./ai-engine:/app
    networks:
      - healio-network

volumes:
  mongodb_data:

networks:
  healio-network:
    driver: bridge
